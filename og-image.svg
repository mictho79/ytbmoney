<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5F5;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F0F9FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E5E7EB" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#FF0000"/>

  <!-- Logo icon (top left) -->
  <rect x="60" y="52" width="52" height="52" rx="10" fill="#FF0000"/>
  <polygon points="73,62 73,94 104,78" fill="#FFFFFF"/>
  <circle cx="99" cy="93" r="14" fill="#111827"/>
  <text x="99" y="99" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="16" font-weight="900" fill="#FFFFFF">$</text>

  <!-- Logo text -->
  <text x="126" y="84" font-family="Arial, sans-serif"
        font-size="22" font-weight="700" fill="#111827">YT Money Calculator</text>

  <!-- Main headline -->
  <text x="60" y="240" font-family="Arial Black, Arial, sans-serif"
        font-size="68" font-weight="900" fill="#111827" letter-spacing="-2">YouTube Money</text>
  <text x="60" y="318" font-family="Arial Black, Arial, sans-serif"
        font-size="68" font-weight="900" fill="#FF0000" letter-spacing="-2">Calculator</text>

  <!-- Subtitle -->
  <text x="60" y="372" font-family="Arial, sans-serif"
        font-size="28" font-weight="400" fill="#6B7280">Estimate YouTube earnings for videos, Shorts,</text>
  <text x="60" y="408" font-family="Arial, sans-serif"
        font-size="28" font-weight="400" fill="#6B7280">and global audiences.</text>

  <!-- CTA badge -->
  <rect x="60" y="452" width="240" height="52" rx="26" fill="#FF0000"/>
  <text x="180" y="484" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="20" font-weight="700" fill="#FFFFFF">Free Calculator</text>

  <!-- Right side — stat cards -->

  <!-- Card 1 -->
  <rect x="680" y="120" width="220" height="110" rx="14" fill="#FFFFFF"
        filter="drop-shadow(0 4px 12px rgba(0,0,0,0.08))"/>
  <rect x="680" y="120" width="220" height="110" rx="14" fill="url(#cardGrad)"
        opacity="0.6"/>
  <text x="790" y="163" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="30" font-weight="900" fill="#16A34A">$1–$10</text>
  <text x="790" y="188" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="14" font-weight="600" fill="#6B7280">RPM per 1,000 views</text>
  <text x="790" y="208" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="12" font-weight="400" fill="#9CA3AF">Long-form average</text>

  <!-- Card 2 -->
  <rect x="920" y="120" width="220" height="110" rx="14" fill="#FFFFFF"
        filter="drop-shadow(0 4px 12px rgba(0,0,0,0.08))"/>
  <text x="1030" y="163" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="26" font-weight="900" fill="#2563EB">$3K–$10K</text>
  <text x="1030" y="188" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="14" font-weight="600" fill="#6B7280">Per 1M views</text>
  <text x="1030" y="208" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="12" font-weight="400" fill="#9CA3AF">Long-form earnings</text>

  <!-- Card 3 -->
  <rect x="680" y="260" width="220" height="110" rx="14" fill="#FFFFFF"
        filter="drop-shadow(0 4px 12px rgba(0,0,0,0.08))"/>
  <text x="790" y="303" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="26" font-weight="900" fill="#EA580C">$30–$120</text>
  <text x="790" y="328" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="14" font-weight="600" fill="#6B7280">Per 1M Shorts views</text>
  <text x="790" y="348" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="12" font-weight="400" fill="#9CA3AF">Shorts RPM ~$0.03–$0.12</text>

  <!-- Card 4 -->
  <rect x="920" y="260" width="220" height="110" rx="14" fill="#FFFFFF"
        filter="drop-shadow(0 4px 12px rgba(0,0,0,0.08))"/>
  <text x="1030" y="303" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="30" font-weight="900" fill="#7C3AED">$4–$12</text>
  <text x="1030" y="328" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="14" font-weight="600" fill="#6B7280">US audience RPM</text>
  <text x="1030" y="348" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="12" font-weight="400" fill="#9CA3AF">Highest RPM country</text>

  <!-- Bar chart visual -->
  <rect x="680" y="420" width="460" height="140" rx="14" fill="#FFFFFF"
        filter="drop-shadow(0 4px 12px rgba(0,0,0,0.06))"/>
  <text x="910" y="447" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" font-weight="700" fill="#9CA3AF" letter-spacing="0.05em">RPM BY REGION</text>

  <!-- Bar: USA -->
  <rect x="710" y="510" width="72" height="34" rx="4" fill="#FF0000" opacity="0.9"/>
  <text x="746" y="527" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" font-weight="700" fill="#FFFFFF">$8</text>
  <text x="746" y="548" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#6B7280">USA</text>

  <!-- Bar: Europe -->
  <rect x="800" y="510" width="72" height="28" rx="4" fill="#2563EB" opacity="0.85"/>
  <text x="836" y="528" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="13" font-weight="700" fill="#FFFFFF">$5</text>
  <text x="836" y="548" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#6B7280">Europe</text>

  <!-- Bar: India -->
  <rect x="890" y="510" width="72" height="10" rx="4" fill="#F59E0B" opacity="0.85"/>
  <text x="926" y="523" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" font-weight="700" fill="#78350F">$1</text>
  <text x="926" y="548" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#6B7280">India</text>

  <!-- Bar: Other -->
  <rect x="980" y="510" width="72" height="16" rx="4" fill="#16A34A" opacity="0.85"/>
  <text x="1016" y="525" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" font-weight="700" fill="#FFFFFF">$2</text>
  <text x="1016" y="548" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#6B7280">Other</text>

  <!-- URL watermark -->
  <text x="1140" y="610" text-anchor="end" font-family="Arial, sans-serif"
        font-size="16" fill="#9CA3AF">ytbmoney.pages.dev</text>
</svg>
